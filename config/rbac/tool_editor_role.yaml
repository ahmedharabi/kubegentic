# permissions for end users to edit tools.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: clusterrole
    app.kubernetes.io/instance: tool-editor-role
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: kubegentic
    app.kubernetes.io/part-of: kubegentic
    app.kubernetes.io/managed-by: kustomize
  name: tool-editor-role
rules:
- apiGroups:
  - agent.kubegentic.dev
  resources:
  - tools
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agent.kubegentic.dev
  resources:
  - tools/status
  verbs:
  - get

---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  name: tools.agent.kubegentic.dev
spec:
  group: agent.kubegentic.dev
  names:
    kind: Tool
    listKind: ToolList
    plural: tools
    singular: tool
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: Tool is the Schema for the tools API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              access:
                default: none
                description: |-
                  Cluster access level. The operator generates a namespace-scoped SA + Role +
                  RoleBinding to match:
                    none      -> no ServiceAccount/RBAC created
                    read      -> get/list/watch on all resources in the namespace
                    readwrite -> all verbs on all resources in the namespace
                enum:
                - none
                - read
                - readwrite
                type: string
              image:
                description: Container image for the tool service.
                type: string
              podSpecOverride:

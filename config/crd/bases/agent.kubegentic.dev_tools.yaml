                  server does not validate its internal structure.
                type: object
                x-kubernetes-preserve-unknown-fields: true
              port:
                default: 8000
                description: Port the tool's HTTP server listens on.
                format: int32
                type: integer
              storage:
                description: Optional ephemeral scratch storage.
                properties:
                  enabled:
                    type: boolean
                  mountPath:
                    default: /data
                    description: Where to mount the scratch volume in the container.
                    type: string
                  sizeLimit:
                    description: Optional cap on the emptyDir size, e.g. "1Gi".
                    type: string
                type: object
            required:
            - image
            type: object
          status:
            description: ToolStatus defines the observed state of Tool
            properties:
              endpoint:
                description: In-cluster address other components use to reach the
                  tool. Written by the controller.
                type: string
              phase:
